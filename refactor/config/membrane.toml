[physics]
R        = 0.4     # rayon extérieur (m)
r_min    = 0.01    # rayon intérieur — évite la singularité ln(r/R) → -∞
k        = 0.05    # k = F/(2πT), paramètre de courbure (m)
friction = 0.05
g        = 9.81
dt       = 0.005   # pas plus petit pour la membrane (surface plus raide)
n_steps  = 3000
frame_ms = 16

[ranges]
r0      = [0.02, 0.39]
theta0  = [0.0,  6.28]
vr0     = [-2.0, 2.0]
vtheta0 = [-6.0, 6.0]

[preset.default]
r0      = 0.25
theta0  = 0.0
vr0     = 0.0
vtheta0 = 1.5

[preset.1]
r0      = 0.0
theta0  = 0.0
vr0     = 0.0
vtheta0 = 0.0

[preset.2]
r0      = 0.0
theta0  = 0.0
vr0     = 0.0
vtheta0 = 0.0
