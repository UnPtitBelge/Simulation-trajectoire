# Spécifique au MCU — les valeurs partagées viennent de common.toml.
# Overrides : dt et n_steps diffèrent du common (MCU analytique, pas d'intégration).
# [ranges] et [preset] sont redéfinis entièrement (paramètres r/omega, pas r0/v0/direction).

[physics]
dt      = 0.016667  # pas de temps (s) ≈ 1/60 — un pas par frame d'animation
n_steps = 3000

[ranges]
r      = [0.05, 0.39]
theta0 = [0.0,  6.28]
omega  = [0.5,  12.0]

[preset.default]
r      = 0.25
theta0 = 0.0
omega  = 4.0

[preset.1]
r      = 0.10
theta0 = 0.0
omega  = 10.0   # rapide, petit rayon

[preset.2]
r      = 0.35
theta0 = 0.0
omega  = 1.5    # lent, grand rayon
