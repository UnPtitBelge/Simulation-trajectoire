[physics]
R        = 0.4     # rayon extérieur (m)
r_min    = 0.05    # rayon intérieur — évite la singularité ln(r/R) → -∞
                   # Doit être ≥ center_radius pour éviter la collision
k        = 0.035   # k = (center_mass·g)/(2πT), paramètre de courbure (m)
friction = 0.02    # coefficient de Coulomb μ (sans unité, bille glissante)
g        = 9.81    # accélération gravitationnelle (m/s²)
dt       = 0.01    # pas de temps (s)
n_steps  = 100000
frame_ms = 16
ball_radius   = 0.005  # rayon de la bille mobile (m)
ball_mass     = 0.005 # masse de la bille mobile (kg)
center_mass   = 1.0   # masse de la bille centrale fixe (kg) — détermine la déformation
center_radius = 0.03  # rayon de la bille centrale fixe (m) → définit r_min

[ranges]
r0            = [0.02, 0.39]
theta0        = [0.0,  6.28]
v0            = [0.0,  2.0]
direction_deg = [-180.0, 180.0]  # 0°=tangentiel, 90°=radial sortant

[preset.default]
r0            = 0.36
theta0        = 0.0
v0            = 0.99   # vitesse initiale (m/s)
direction_deg = -5   # 0° = purement tangentiel

[preset.1]
r0            = 0.20
theta0        = 1.57
v0            = 1.5
direction_deg = 45.0   # mi-tangentiel, mi-radial sortant

[preset.2]
r0            = 0.10
theta0        = 3.14
v0            = 2.0
direction_deg = -90.0  # radial entrant (bille lancée vers le centre)
