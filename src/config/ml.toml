[physics]
frame_ms = 16   # intervalle d'animation en ms (utilisé par BaseSimWidget)

[paths]
tracking_data = "data/tracking_data.csv"
synth_data_dir = "data/synthetic"
models_dir     = "data/models"

# Calibration de la caméra (résolution 1920×1080)
# center_x/center_y : position en pixels du centre du cône dans l'image.
# Par défaut = centre géométrique de la frame. À ajuster si le cône
# n'est pas centré dans la vidéo.
#
# px_per_meter : mesurer dans l'image le rayon du bord du cône en pixels,
# puis calculer : px_per_meter = rayon_pixels / 0.4
# Exemple : si le bord du cône est à 540 px du centre → 540 / 0.4 = 1350
[tracking]
center_x      = 960      # centre de la frame 1920×1080
center_y      = 540
px_per_meter  = 1350.0   # à affiner : rayon_pixels_du_bord / 0.4 m
R             = 0.4      # rayon physique du cône (m) — même que cone.toml
center_radius = 0.05     # rayon de la bille centrale (m) → r_min pour la prédiction
n_passes      = 3        # nombre de passes d'entraînement sur les données réelles

# Paramètres physiques utilisés pour la génération synthétique
# Doit correspondre à cone.toml pour cohérence avec les données réelles
[synth.physics]
R             = 0.4
depth         = 0.09
friction      = 0.02
g             = 9.81
dt            = 0.01
n_steps       = 100_000  # pas max par trajectoire d'entraînement (arrêt anticipé si |v|→0 ou r≥R)
center_radius = 0.05     # rayon de la bille centrale (m) → r_min pour la prédiction

# Borne max pour la prédiction ML et l'animation.
# Indépendant de n_steps : les 3 conditions d'arrêt (r≥R, |v|→0, n_steps_pred)
# s'appliquent, donc la trajectoire affichée sera bien plus courte en pratique.
[display]
n_steps_pred = 10_000  # 100 s à dt=0.01 — largement suffisant pour toute trajectoire

[synth.generation]
n_trajectories = 1_000_000
chunk_size     = 10_000
v_min      = 0.3    # vitesse min (m/s) — élimine les trajectoires quasi-statiques
v_max      = 2.0    # vitesse max (m/s) — limité pour stabilité numérique
min_steps  = 50     # trajectoires de moins de 50 pas ignorées (bille qui sort immédiatement)

# Contextes d'entraînement (fraction des chunks utilisés)
[synth.contexts]
names     = ["10pct", "50pct", "100pct"]
fractions = [0.10,    0.50,    1.00]

[ranges]
r0            = [0.02, 0.39]
theta0        = [0.0,  6.28]
v0            = [0.0,  2.0]
direction_deg = [-180.0, 180.0]  # 0°=tangentiel, 90°=radial sortant

[preset.default]
r0            = 0.36
theta0        = 0.0
v0            = 0.99
direction_deg = -5    # 0° = purement tangentiel

[preset.1]
r0            = 0.20
theta0        = 1.57
v0            = 1.5
direction_deg = 45.0   # mi-tangentiel, mi-radial sortant

[preset.2]
r0            = 0.10
theta0        = 3.14
v0            = 2.0
direction_deg = -90.0  # radial entrant (bille lancée vers le centre)
