# Spécifique au pipeline ML — les valeurs partagées viennent de common.toml.
# [synth.physics] ne contient que depth (spécifique au cône) ; R, g, friction,
# dt, n_steps, center_radius et v_stop sont hérités de common.toml [physics].

[paths]
tracking_data = "data/tracking_data.csv"
synth_data_dir = "data/synthetic"
models_dir     = "data/models"

# Calibration de la caméra (résolution 1920×1080)
# center_x/center_y : position en pixels du centre du cône dans l'image.
# Par défaut = centre géométrique de la frame. À ajuster si le cône
# n'est pas centré dans la vidéo.
#
# px_per_meter : mesurer dans l'image le rayon du bord du cône en pixels,
# puis calculer : px_per_meter = rayon_pixels / 0.4
# Exemple : si le bord du cône est à 540 px du centre → 540 / 0.4 = 1350
[tracking]
center_x       = 960      # centre de la frame 1920×1080
center_y       = 540
px_per_meter   = 1350.0   # à affiner : rayon_pixels_du_bord / 0.4 m
n_passes       = 3        # nombre de passes d'entraînement sur les données réelles
fps            = 30       # fréquence d'acquisition de la caméra (Hz)
roi_margin     = 120      # demi-largeur de la fenêtre ROI pour la détection (px)
n_trail_frames = 20       # nombre de positions conservées pour le tracé de trajectoire
real_width     = 172      # largeur réelle (unités arbitraires) — paramètre PositionsAnalytics
video_width    = 960      # largeur vidéo (px) utilisée lors de l'enregistrement
# R, center_radius, v_stop → common.toml [physics]

# Paramètres physiques utilisés pour la génération synthétique.
# Seul depth est spécifique au cône ML ; les autres (R, g, friction, dt,
# n_steps, center_radius, v_stop) sont hérités de common.toml [physics].
[synth.physics]
depth         = 0.09

# Borne max pour la prédiction ML et l'animation.
# Indépendant de n_steps : les 3 conditions d'arrêt (r≥R, |v|→0, n_steps_pred)
# s'appliquent, donc la trajectoire affichée sera bien plus courte en pratique.
[display]
n_steps_pred  = 10_000  # 100 s à dt=0.01 — largement suffisant pour toute trajectoire
n_train_trajs = 20      # nombre de trajectoires d'entraînement affichées en arrière-plan

[synth.generation]
n_trajectories = 1_000_000
chunk_size     = 10_000
v_min      = 0.3    # vitesse min (m/s) — élimine les trajectoires quasi-statiques
v_max      = 2.0    # vitesse max (m/s) — limité pour stabilité numérique
min_steps  = 50     # trajectoires de moins de 50 pas ignorées (bille qui sort immédiatement)

# Mode grille : produit cartésien (r0, θ0, v0, direction) pour une couverture systématique.
# Total = n_r × n_theta × n_v × n_dir trajectoires.
# Activé avec : python generate_data.py --mode grid
[synth.grid]
n_r     = 30   # rayons  (linspace en r² → densité uniforme en surface)
n_theta = 36   # angles  (équirépartis sur [0, 2π[, tous les 10°)
n_v     = 5    # vitesses (linspace sur [v_min, v_max])
n_dir   = 12   # directions (équiréparties sur [-π, π[, tous les 30°)
# → 30 × 36 × 5 × 12 = 64 800 trajectoires par défaut

# Contextes d'entraînement (fraction des chunks utilisés)
[synth.contexts]
names     = ["1pct", "10pct", "50pct", "100pct"]
fractions = [0.01,   0.10,   0.50,    1.00]

# Hyperparamètres des modèles ML.
# Changer ces valeurs nécessite de régénérer les modèles (train_models.py).
# N_FEATURES = 9 : (r, cosθ, sinθ, vr, vθ, vθ²/r, vr·vθ/r, sinθ·vθ/r, cosθ·vθ/r)
# Les 3 dernières features capturent les produits croisés (Coriolis + couplage angulaire)
# nécessaires pour que LinearStepModel évite les oscillations en prédiction récursive.
[model]
n_features      = 9
linear_alpha    = 0.001  # régularisation Ridge (LinearStepModel)
mlp_hidden      = [64, 32]
mlp_alpha       = 0.001  # régularisation L2 (MLPStepModel)
mlp_n_epochs    = 5      # passes sur les chunks (shuffle à chaque epoch)
mlp_patience    = 2      # early stopping : epochs sans amélioration avant arrêt
n_scaler_chunks = 10     # chunks tirés uniformément pour calibrer les scalers partagés
val_fraction    = 0.05   # fraction des chunks réservée à la validation (early stopping MLP)

# [ranges] et [preset.*] → hérités de common.toml
